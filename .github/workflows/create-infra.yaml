name: Infrastructure Creation

on:
  push:
    branches:
      - main
      - feature/create-EC2-and-S3
  workflow_dispatch:
    inputs:
      account_id:
        type: string
        required: true
        default: '411052131155'
      ResourceName:
        description: 'Mention the resource to be created'
        type: choice
        options:
          - 'S3'
          - 'EC2_instance'
        default: 'EC2_instance'
      RegionName:
        description: 'Name of the region'
        type: string
        default: 'us-east-1'

env:
  AWS_REGION: ${{ inputs.RegionName }}
  AWS_RESOURCE: ${{ inputs.ResourceName }}

jobs:
  Terraform-Plan:
    name: ${{ inputs.ResourceName }} Plan
    runs-on: [ubuntu-latest]
    defaults:
      run:
        working-directory: ./terraform/${{ env.AWS_RESOURCE }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          account_id: ${{ inputs.account_id }}
          aws_region: ${{ inputs.RegionName }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.3.0

      - name: Terraform Format
        run: terraform fmt

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -lock-timeout=30s -var-file="../../My_AWS_Account/${{ env.AWS_REGION }}/${{ env.AWS_RESOURCE }}/terraform.tfvars" -out="$GITHUB_WORKSPACE/terraform_plan/${{ env.AWS_RESOURCE }}.plan"
          echo "# Terraform Plan for ${{ env.AWS_RESOURCE }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color "$GITHUB_WORKSPACE/terraform_plan/${{ env.AWS_RESOURCE }}.plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.AWS_REGION }}-${{ env.AWS_RESOURCE }}
          path: |
            terraform_plan/*.plan
          retention-days: 1

  Terraform-Apply:
    name: ${{ inputs.ResourceName }} Creation
    runs-on: [ubuntu-latest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: Terraform-Plan
    defaults:
      run:
        working-directory: ./terraform/${{ env.AWS_RESOURCE }}
    environment:
      name: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          account_id: ${{ inputs.account_id }}
          aws_region: ${{ inputs.RegionName }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.3.0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.AWS_REGION }}-${{ env.AWS_RESOURCE }}
          path: |
            terraform_plan/${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.AWS_REGION }}-${{ env.AWS_RESOURCE }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply "$GITHUB_WORKSPACE/terraform_plan/${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.AWS_REGION }}-${{ env.AWS_RESOURCE }}/${{ env.AWS_RESOURCE }}.plan"